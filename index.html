<!DOCTYPE html>
<html>
<head>
    <title>Thank You 💖</title>
    <style>
        body {
            background: linear-gradient(135deg, #a0e9ff, #ffc6ff);
            font-family: "Comic Sans MS", cursive, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            font-size: 60px;
            color: white;
            text-shadow: 2px 2px 5px #ff69b4;
        }

        p {
            font-size: 25px;
            color: white;
        }

        .heart {
            font-size: 40px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0px); }
            to { transform: translateY(-15px); }
        }

        button {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 20px;
            background-color: white;
            color: #ff69b4;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff69b4;
            color: white;
        }
    </style>
</head>
<body>

    <h1>Thank You So Much 💕</h1>
    <p>You mean a lot to me ✨</p>
    <div class="heart">💖💖💖</div>

    <button onclick="showMessage()">Click Me!</button>

    <script>
        function showMessage() {
            alert("You're truly appreciated 🥺💙");
        }
    </script>

</body>
</html>
